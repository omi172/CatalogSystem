<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Book Feedback - CatalogSystem</title>
    <!-- Stable v3 Tailwind CDN to avoid parsing edge cases with newer versions -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-6">

<div class="w-full max-w-md bg-white rounded-xl shadow-md p-8 border border-gray-100">
    <h2 class="text-2xl font-bold text-gray-800 mb-2">Book Feedback</h2>
    <p class="text-gray-500 text-sm mb-6">We value your thoughts on the books in our catalog.</p>

    <!-- Form binds to feedbackObj -->
    <form th:action="@{/feedback}" th:object="${feedback}" method="POST" class="space-y-5">

        <!-- Name Field -->
        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Your Name</label>
            <input type="text" th:field="*{name}" required="required"
                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none text-gray-800 placeholder-gray-400 text-sm"
                   placeholder="Amit" />
        </div>

        <!-- Book Name Field -->
        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Book Name</label>
            <input type="text" th:field="*{bookName}" required="required"
                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none text-gray-800 placeholder-gray-400 text-sm"
                   placeholder="e.g., Spring Boot in Action" />
        </div>

        <!-- Feedback Field -->
        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Feedback</label>
            <textarea th:field="*{feedback}" rows="4" required="required"
                      class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none text-gray-800 placeholder-gray-400 text-sm resize-none"
                      placeholder="Write your review here..."></textarea>
        </div>

        <!-- Submit Button -->
        <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 px-4 rounded-lg transition duration-200 text-sm cursor-pointer">
            Submit Feedback
        </button>
    </form>
</div>

</body>
</html>
