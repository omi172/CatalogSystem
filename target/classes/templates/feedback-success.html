<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Submitted Successfully</title>
    <!-- Stable Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-6">

<div class="w-full max-w-md bg-white rounded-2xl shadow-lg p-8 border border-gray-100 text-center transform transition-all duration-300 hover:shadow-xl">

    <!-- Animated Success Badge -->
    <div class="mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-green-50 mb-6 border border-green-100">
        <svg class="h-8 w-8 text-green-500 animate-bounce" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path>
        </svg>
    </div>

    <!-- Heading -->
    <h2 class="text-2xl font-bold text-gray-900 mb-2">Thank You!</h2>
    <p class="text-sm text-gray-400 uppercase tracking-wider font-semibold mb-4">Feedback Received</p>

    <!-- Dynamic Message Block from Spring Boot Controller -->
    <div class="bg-gray-50 rounded-xl p-4 border border-gray-200/60 mb-6 text-left">
        <p class="text-gray-600 text-sm leading-relaxed text-center italic"
           th:text="${message}">
            Your feedback has been successfully processed and recorded in our catalog system.
        </p>
    </div>

    <div class="space-y-3">
        <!-- Action Button: Go Back -->
        <a th:href="@{/feedback}"
           class="block w-full text-center bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium py-3 px-4 rounded-xl transition-colors duration-200 shadow-sm">
            Submit Another Response
        </a>
    </div>
</div>

</body>
</html>
